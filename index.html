  function makeHookTitle(title, i) {
    if(!title) return "📰 오늘의 주요 금융 소식";
    for(const [k,h] of HOOKS) if(title.includes(k)) return h;
    return `${"📌💡🔔⚡"[i%4]} ${title.slice(0,26)}...`;
  }

  function getInsight(title, summary) {
    const t = (title+" "+summary).toLowerCase();
    if(t.includes("금리")&&t.includes("인상")) return "금리 인상 → 변동금리 대출 부담 증가. 고정금리 전환 또는 보장성 보험 재검토 필요";
    if(t.includes("금리")&&t.includes("인하")) return "금리 인하 → 저축·연금보험 수익률 하락 가능. 현재 계약 이율 확인 후 포트폴리오 조정 권고";
    if(t.includes("금리")) return "금리 변동은 저축보험·연금 수익률에 직접 영향. 지금 계약 조건 점검이 필요한 시점";
    if(t.includes("보험료")&&t.includes("인상")) return "보험료 인상 예고 → 갱신 전 특약 조정으로 절감 가능. 지금 계약 검토 권장";
    if(t.includes("보험료")) return "보험료 변동 전 현재 계약의 보장 내용과 납입 조건 재확인 필요";
    if(t.includes("연금")&&t.includes("개혁")) return "연금 개혁 → 공적 연금 감소 가능성. 개인연금·퇴직연금으로 노후 보완 전략 수립 시급";
    if(t.includes("연금")) return "공적 연금만으론 노후 부족. 개인연금 추가 납입 또는 종신연금 전환 검토 권장";
    if(t.includes("실손")) return "실손보험 구조 변화 → 현재 가입 세대 확인 후 4세대 전환 여부 상담 필요";
    if(t.includes("세금")||t.includes("절세")) return "세제 변화 → 연금저축·IRP 세액공제 한도 활용이 절세 핵심. 연말 전 납입 전략 점검 권장";
    if(t.includes("주식")||t.includes("코스피")) return "증시 변동성 확대 → 변액보험 펀드 비중 점검 및 안전자산 재배분 고려";
    if(t.includes("부동산")||t.includes("아파트")) return "부동산 가격 변동 → 화재·재물보험 보장 금액 재설정 필요. 현재 계약 한도 확인 권장";
    if(t.includes("고령")||t.includes("노후")||t.includes("은퇴")) return "고령화 시대 의료비·생활비 급증 → 종신보험·간병보험 추가 및 은퇴 설계 상담 권장";
    if(t.includes("암")||t.includes("질병")||t.includes("의료")) return "의료비 부담 증가 → 실손·암보험 보장 범위 점검 및 부족한 보장 추가 가입 검토";
    if(t.includes("물가")||t.includes("인플레")) return "물가 상승 → 보험금 실질 가치 하락. 보장금액 상향 또는 물가연동형 보험 검토 필요";
    return "이 뉴스와 내 보험의 연관성, 설계사와 함께 점검해보세요";
  }

  async function fetchRssNews(category) {
    const PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
    const cat = CATEGORIES.find(c=>c.id===category);
    if(!cat) return [];
    let articles = [];
    for(const feedUrl of cat.feeds) {
      try {
        const res = await fetch(`${PROXY}${encodeURIComponent(feedUrl)}&count=10`);
        const data = await res.json();
        if(data.status==="ok"&&data.items) articles=[...articles,...data.items];
      } catch(e) {}
    }
    if(cat.keyword) {
      const filtered = articles.filter(a=>(a.title||"").includes(cat.keyword)||(a.description||"").includes(cat.keyword));
      if(filtered.length>=2) articles=filtered;
    }
    const seen=new Set();
    articles=articles.filter(a=>{ if(seen.has(a.title))return false; seen.add(a.title); return true; });
    articles.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
    return articles.slice(0,4).map((item,i)=>{
      const rawSummary = stripHtml(item.description||item.content||"").slice(0,200);
      return {
        hook_title: makeHookTitle(item.title,i),
        real_title: item.title||"제목 없음",
        summary: rawSummary,
        source: item.author||new URL(item.link||"https://news.naver.com").hostname.replace("www.",""),
        link: item.link||"#",
        pubDate: item.pubDate,
        importance: i===0?"high":i===1?"medium":"low",
        insight: getInsight(item.title||"",rawSummary),
      };
    });
  }

  // 고객 가입 화면 (최초 1회)

  function OnboardingScreen({ onComplete }) {
    const [step, setStep] = useState(1);

            <p style={{ fontSize:11, color:"#C8A55A", fontWeight:700, letterSpacing:2, marginBottom:4 }}>SAMSUNG LIFE INSURANCE</p>
            <p style={{ fontSize:20, fontWeight:900, color:"#fff", marginBottom:4 }}>주진명의 데일리 브리핑</p>
            <p style={{ fontSize:13, color:"rgba(255,255,255,0.6)" }}>맞춤 보험·금융 뉴스 서비스</p>
          </div>

          <div style={{ padding:"24px 20px" }}>
            {step===1 && (
              <div style={{ animation:"fadeIn 0.3s ease" }}>
                <p style={{ fontSize:16, fontWeight:900, color:"#001F5C", marginBottom:6 }}>안녕하세요! 👋</p>
                <p style={{ fontSize:13, color:"#5C7A9B", marginBottom:20, lineHeight:1.6 }}>처음 방문하셨군요! 맞춤 뉴스를 위해 간단한 정보를 입력해주세요.</p>
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

                    <p style={{ fontSize:12, fontWeight:700, color:"#7A9ABB", marginBottom:6 }}>이름</p>
                    <input value={name} onChange={e=>setName(e.target.value)} placeholder="홍길동" style={S.input} />

        setLoading(false);

  // 비밀번호 잠금
  // ══════════════════════════════════════════════════════
  function LockScreen({ onUnlock }) {
    const [dots, setDots] = useState([]);
    const [shake, setShake] = useState(false);
    const nums = [1,2,3,4,5,6,7,8,9,"",0,"⌫"];
    const handleNum = (n) => {
      if(dots.length>=4) return;
      const next=[...dots,n];
      setDots(next);
      if(next.length===4) {
        setTimeout(()=>{
          if(next.join("")===ADMIN_PW) { onUnlock(); }
          else { setShake(true); setTimeout(()=>{ setShake(false); setDots([]); },600); }
        },200);
      }
    };
    return (
      <div style={{ position:"fixed", inset:0, background:"linear-gradient(160deg,#001F5C,#003D8F)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:999 }}>
        <div style={{ width:64, height:64, borderRadius:"50%", background:"linear-gradient(135deg,#C8A55A,#E2C876)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, marginBottom:16 }}>🔐</div>
        <p style={{ fontSize:12, color:"#C8A55A", fontWeight:700, letterSpacing:2, marginBottom:6 }}>CONSULTANT ONLY</p>
        <p style={{ fontSize:18, fontWeight:900, color:"#fff", marginBottom:28 }}>관리자 비밀번호</p>
        <div style={{ display:"flex", gap:16, marginBottom:36, animation:shake?"shake 0.5s ease":"none" }}>
          {[0,1,2,3].map(i=><div key={i} style={{ width:16, height:16, borderRadius:"50%", background:i<dots.length?"#C8A55A":"rgba(255,255,255,0.2)", border:"2px solid rgba(255,255,255,0.3)", transition:"background 0.15s" }}/>)}
        </div>
        {shake&&<p style={{ color:"#FF6B6B", fontSize:13, fontWeight:700, marginBottom:16 }}>비밀번호가 틀렸습니다</p>}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 72px)", gap:12 }}>
          {nums.map((n,i)=>(
            <button key={i} onClick={()=>{ if(n==="⌫") setDots(d=>d.slice(0,-1)); else if(n!=="") handleNum(String(n)); }}
              style={{ width:72, height:72, borderRadius:"50%", background:n===""?"transparent":"rgba(255,255,255,0.12)", border:n===""?"none":"1px solid rgba(255,255,255,0.2)", color:"#fff", fontSize:n==="⌫"?22:24, fontWeight:700, cursor:n===""?"default":"pointer" }}
            >{n}</button>
          ))}
        </div>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════
  // 메인 앱
  // ══════════════════════════════════════════════════════
  function App() {
    const [tab, setTab] = useState("news");
    const [adminUnlocked, setAdminUnlocked] = useState(false);
    const [showLock, setShowLock] = useState(false);
    const [customer, setCustomer] = useState(null);
    const [checkingCustomer, setCheckingCustomer] = useState(true);

    useEffect(()=>{
      const id = localStorage.getItem("jjm_customer_id");
      const name = localStorage.getItem("jjm_customer_name");
      if(id && name) {
        setCustomer({ id, name });
        // 방문 시간 업데이트
        db.collection("customers").doc(id).update({ lastVisit: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
      }
      setCheckingCustomer(false);
    },[]);

    if(checkingCustomer) return <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:"#001F5C" }}><div style={{ color:"#C8A55A", fontSize:16, fontWeight:700 }}>로딩 중...</div></div>;

    if(!customer) return <OnboardingScreen onComplete={setCustomer} />;

    return (
      <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#EBF2FC" }}>
        {showLock && <LockScreen onUnlock={()=>{ setAdminUnlocked(true); setShowLock(false); setTab("admin"); }} />}
        <div style={{ position:"sticky", top:0, zIndex:100, background:"#001240", display:"flex", borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
          <button onClick={()=>setTab("news")} style={{ flex:1, padding:"14px 0", border:"none", cursor:"pointer", background:"none", color:tab==="news"?"#C8A55A":"rgba(255,255,255,0.45)", fontSize:14, fontWeight:900, borderBottom:tab==="news"?"3px solid #C8A55A":"3px solid transparent", transition:"all 0.2s" }}>📰 뉴스</button>
          <button onClick={()=>{ if(!adminUnlocked) setShowLock(true); else setTab("admin"); }} style={{ width:44, padding:"14px 0", border:"none", cursor:"pointer", background:"none", color:tab==="admin"?"#C8A55A":"rgba(255,255,255,0.15)", fontSize:11, fontWeight:700, borderBottom:tab==="admin"?"3px solid #C8A55A":"3px solid transparent" }}>⚙️</button>
        </div>
        {tab==="news" && <NewsTab customerName={customer.name}/>}
        {tab==="admin" && adminUnlocked && <AdminTab/>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
